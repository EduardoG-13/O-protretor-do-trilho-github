# Workflow para deploy do jogo "O Protetor do Trilho" no GitHub Pages
name: Deploy to GitHub Pages

on:
  # Executa no push para a branch principal
  push:
    branches: ["main"]

  # Permite executar manualmente pela aba Actions
  workflow_dispatch:

# Permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy por vez, cancelando execuções anteriores em andamento
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Faz checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura o GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Faz upload dos arquivos do site como artefato do Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz upload do diretório raiz (onde está o index.html)
          path: "."

      # 4. Faz o deploy no GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
